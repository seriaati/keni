line-length = 100
target-version = "py314"

[lint]
future-annotations = true
preview = true
select = [
    "F",
    "E",
    "W",
    "C90",
    "I",
    "N",
    "UP",
    "ANN",
    "ASYNC",
    "S",
    "B",
    "A",
    "C4",
    "DTZ",
    "EM",
    "FA",
    "ISC",
    "LOG",
    "G",
    "PIE",
    "T20",
    "PT",
    "RSE",
    "RET",
    "SLOT",
    "SIM",
    "TC",
    "ARG",
    "PTH",
    "PL",
    "TRY",
    "FAST",
    "PERF",
    "FURB",
    "RUF",
]
ignore = [
    "S101",    # Assert used
    "PLR2004", # Magic value used
    "RUF003",  # Comment contains ambiguous character
    "PLR6301", # Method could be a function, class method, or static method
    "ANN401",  # typing.Any used
    "DTZ007",  # Naive datetime constructed
    "E501",    # Line too long
    "S311",    # Standard pseudo-random generators are not suitable for security/cryptographic purposes
    "ANN003",  # Missing type annotation for kwargs
    "RUF001",  # Use of ambiguous Unicode characters
]

[lint.per-file-ignores]
"**/__init__.py" = ["F403", "F401"] # Wildcard imports used
"test.py" = ["ALL"]
"migrations/**.py" = ["ALL"]

[lint.flake8-type-checking]
runtime-evaluated-base-classes = [
    "pydantic.BaseModel",
    "pydantic_settings.BaseSettings",
    "sqlmodel.SQLModel",
]
runtime-evaluated-decorators = [
    "pydantic.dataclasses.dataclass",
    "pydantic_settings.dataclasses.dataclass",
    "fastapi.APIRouter.get",
    "fastapi.APIRouter.post",
    "fastapi.APIRouter.put",
    "fastapi.APIRouter.delete",
    "fastapi.APIRouter.options",
    "fastapi.APIRouter.head",
    "fastapi.APIRouter.patch",
]

[lint.mccabe]
max-complexity = 15

[lint.pydocstyle]
convention = "google"

[lint.isort]
split-on-trailing-comma = false

[format]
skip-magic-trailing-comma = true
